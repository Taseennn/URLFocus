<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="blockedsites.css">
  </head>
  <body>
    <h1>Blocked Sites</h1>
    <p>Here it will dynamically display blocked sites.</p>

    <div id="addSite">
      <input type="text" id="siteInput" placeholder="Enter site URL">
      <button id="addSiteButton">Add Site</button>
    </div>


    <div id="blockedSitesContainer">
      <ul id="blockedSites"></ul>
    </div>
    
    <div id="buttons">
      <button id="return">Return</button>
      <button id="save">Save</button>
    </div>
    
    <script src="blockedsites.js"></script>
  </body>
</html>
